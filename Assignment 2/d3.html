<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Weather Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 20px;
        }

        h1 {
            text-align: center;
        }

        .controls {
            text-align: center;
            margin-bottom: 20px;
        }

        select {
            padding: 8px 12px;
            font-size: 16px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>

<h1>☁️ Interactive Weather Dashboard ☁️</h1>

<div class="controls">
    <label for="city">Select City: </label>
    <select id="city" onchange="updateData()">
        <option value="pune">Pune</option>
        <option value="mumbai">Mumbai</option>
        <option value="delhi">Delhi</option>
    </select>
</div>

<div class="dashboard">
    <div class="card">
        <h3> 🌡️ Temperature (°C)</h3>
        <canvas id="tempchart"></canvas>
    </div>

    <div class="card">
        <h3>Humidity (%)</h3>
        <canvas id="humiditychart"></canvas>
    </div>

    <div class="card">
        <h3>🌧️ Rainfall (mm)</h3>
        <canvas id="rainfallchart"></canvas>
    </div>
</div>

<script>
    const WeatherData = {
        pune: {
            temp: [24, 26, 28, 27, 25, 24, 23],
            humidity: [60, 58, 55, 57, 59, 62, 65],
            rainfall: [0, 2, 5, 1, 0, 0, 0]
        },
        mumbai: {
            temp: [30, 29, 31, 30, 29, 28, 27],
            humidity: [65, 67, 70, 68, 66, 64, 63],
            rainfall: [5, 12, 20, 18, 10, 6, 8]
        },
        delhi: {
            temp: [18, 20, 22, 23, 21, 19, 18],
            humidity: [50, 48, 45, 46, 49, 52, 54],
            rainfall: [0, 0, 1, 0, 0, 0, 0]
        }
    };

    const labels = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

    const tempchart = new Chart(document.getElementById("tempchart"), {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: "Temperature",
                data: WeatherData.pune.temp,
                 borderColor: "pink",
                borderWidth: 2
            }]
        }
    });

    const humiditychart = new Chart(document.getElementById("humiditychart"), {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "Humidity",
                data: WeatherData.pune.humidity,
                 backgroundColor: "yellow"
              
            }]
        }
    });

    const rainfallchart = new Chart(document.getElementById("rainfallchart"), {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "Rainfall",
                data: WeatherData.pune.rainfall,
                 backgroundColor: "blue"
      
            }]
        }
    });

    function updateData() {
        const city = document.getElementById("city").value;

        tempchart.data.datasets[0].data = WeatherData[city].temp;
        humiditychart.data.datasets[0].data = WeatherData[city].humidity;
        rainfallchart.data.datasets[0].data = WeatherData[city].rainfall;

        tempchart.update();
        humiditychart.update();
        rainfallchart.update();
    }
</script>

</body>
</html>
